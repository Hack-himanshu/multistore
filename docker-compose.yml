version: '3.9'

services:
  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: multistore_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - multistore_net
    environment:
      MONGO_INITDB_DATABASE: multistore

  # ── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: multistore_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/multistore
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:3000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-admin@multistore.com}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-SuperAdmin@123}
    depends_on:
      - mongodb
    networks:
      - multistore_net

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: multistore_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - multistore_net

volumes:
  mongo_data:
    driver: local

networks:
  multistore_net:
    driver: bridge
